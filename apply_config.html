<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>应用问卷配置</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,.1); max-width: 600px; width: 90%; text-align: center; }
h1 { color: #1f2937; margin-bottom: 16px; font-size: 24px; }
p { color: #6b7280; margin-bottom: 32px; line-height: 1.6; }
.btn { background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; padding: 14px 32px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all .2s; margin: 8px; min-width: 200px; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,.3); }
.btn-secondary { background: #10b981; }
.btn-tertiary { background: #6366f1; }
.info-box { background: #f9fafb; border-radius: 12px; padding: 20px; margin: 24px 0; text-align: left; }
.info-box h3 { color: #374151; margin-bottom: 12px; font-size: 16px; }
.info-box ul { padding-left: 20px; color: #6b7280; }
.info-box li { margin-bottom: 8px; }
.result { margin-top: 24px; padding: 16px; border-radius: 12px; background: #f0f9ff; border: 1px solid #bae6fd; display: none; }
.result.success { background: #f0fdf4; border-color: #bbf7d0; }
.result.error { background: #fef2f2; border-color: #fecaca; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 应用问卷配置</h1>
  <p>点击下方按钮，将20道关系评估题目应用到问卷系统中。</p>
  
  <div class="info-box">
    <h3>包含内容：</h3>
    <ul>
      <li><strong>第一部分：你的魅力基石</strong>（1-5题）</li>
      <li><strong>第二部分：关系健康度</strong>（6-12题）</li>
      <li><strong>第三部分：他的投入与爱意</strong>（13-20题）</li>
      <li>总计：20道专业评估题目</li>
    </ul>
  </div>
  
  <button class="btn" onclick="applyConfig()">💾 应用20道题配置</button>
  <button class="btn btn-secondary" onclick="window.location.href='index.html'">📄 查看问卷页面</button>
  <button class="btn btn-tertiary" onclick="window.location.href='admin.html'">⚙️ 进入管理后台</button>
  
  <div id="result" class="result"></div>
</div>

<script>
function applyConfig() {
  try {
    // 20道题的完整配置
    const config = {
      title: "关系健康度与魅力评估问卷",
      description: "本问卷分为三个部分，帮助你全面评估自己的魅力、关系健康度和对方的投入度。请根据实际情况诚实作答。",
      questions: [
        // ========== 第一部分：你的魅力基石（1-5题） ==========
        { id:"part1_intro", type:"radio", required:false, title:"第一部分：你的魅力基石（1-5题）", description:["这部分帮助你看见，在关系中你是否依然保持着自己最吸引人的光芒。"], options:[] },
        { id:"q1", type:"radio", required:true, title:"1. 当你独自一人时，你内心最常浮现的感受是？", description:[], options:["A. 平静而充实，有很多自己想做的事", "B. 有点无聊，但能安排自己", "C. 隐隐不安，总想联系他或等待他的消息", "D. 空虚、焦虑，觉得生活没有他就没有意义"] },
        { id:"q2", type:"radio", required:true, title:"2. 关于自己的事业/爱好/成长，你的态度是？", description:[], options:["A. 我有清晰的目标，并且正在为之努力，这让我很有成就感", "B. 我有一些爱好，但常因感情而搁置", "C. 我大部分精力都放在'我们'的关系上，自己的事搁置了", "D. 我几乎没有自己的社交圈和爱好，他是我的全部"] },
        { id:"q3", type:"radio", required:true, title:"3. 当你和伴侣发生分歧时，你最惯常的反应是？", description:[], options:["A. 冷静表达自己的感受和需求，寻求共同解决", "B. 为了避免冲突，先妥协，但内心委屈", "C. 情绪激动，用指责或冷战的方式试图让他'懂'我", "D. 极度恐慌，害怕失去，立刻道歉或放弃自己的立场"] },
        { id:"q4", type:"radio", required:true, title:"4. 照镜子时，你对自己外在形象的评价是？", description:[], options:["A. 我很欣赏自己，打扮更多是为了取悦自己", "B. 基本满意，但会因为他的一句评价而焦虑", "C. 感觉不如以前了，没什么心思打理自己", "D. 很自卑，觉得自己不够好，配不上他"] },
        { id:"q5", type:"radio", required:true, title:"5. 对于'如果分手，我的人生会如何'这个念头，你的第一反应是？", description:[], options:["A. 会很痛苦，但我相信我最终能走出来，并过得更好", "B. 不敢想，我觉得离开他我可能再也找不到更好的了", "C. 天会塌下来，我完全无法想象一个人怎么活", "D. 我从未想过这个可能，我们的关系坚不可摧"] },
        // ========== 第二部分：你们的关系健康度（6-12题） ==========
        { id:"part2_intro", type:"radio", required:false, title:"第二部分：你们的关系健康度（6-12题）", description:["这部分评估你们互动的模式、沟通的质量和关系的根基。"], options:[] },
        { id:"q6", type:"radio", required:true, title:"6. 你们日常沟通中，关于'感受'的对话占比是多少？", description:[], options:["A. 经常分享彼此的喜怒哀乐，他会认真听，我也会", "B. 主要聊日常琐事或安排，很少深入谈感受", "C. 我单方面想聊感受，他常回避或敷衍", "D. 几乎不沟通感受，一谈就容易吵架"] },
        { id:"q7", type:"radio", required:true, title:"7. 当你在工作中/生活中受了委屈，向他倾诉时，他的典型反应是？", description:[], options:["A. 放下手头的事，专注倾听，先共情，再问你需要什么帮助", "B. 简单安慰几句'别想太多'，然后转移话题", "C. 直接给你讲道理，分析你的不对，让你感觉更糟", "D. 表现出不耐烦，觉得你小题大做"] },
        { id:"q8", type:"radio", required:true, title:"8. 你们发生争吵后，通常会如何解决？", description:[], options:["A. 冷静后，双方会主动沟通，一起复盘，关系更紧密", "B. 冷战一段时间，然后不了了之，假装没发生过", "C. 总是我先低头去哄他、道歉，才能和好", "D. 矛盾越积越多，从未真正解决，经常翻旧账"] },
        { id:"q9", type:"radio", required:true, title:"9. 在重要的节日、纪念日或你遇到困难时，他给你的'惊喜'或'支持'是？", description:[], options:["A. 总能记在心里，用我意想不到或我喜欢的方式表达", "B. 需要我提醒，但提醒后会做", "C. 口头承诺多，实际行动少，经常'画饼'", "D. 完全忽略，并觉得这些形式主义很麻烦"] },
        { id:"q10", type:"radio", required:true, title:"10. 关于未来（如定居、职业、家庭等），你们聊得如何？", description:[], options:["A. 我们经常畅想未来，并且目标一致，在共同规划", "B. 聊过，但比较模糊，没有具体计划", "C. 我聊时他回避，或说'现在这样挺好，别想那么远'", "D. 从未聊过，感觉我们的未来没有交集"] },
        { id:"q11", type:"radio", required:true, title:"11. 当你需要他为你做出一些牺牲或改变（比如换个工作、改掉某个习惯）时，他会？", description:[], options:["A. 认真考虑，并愿意为了我们的关系做出努力和调整", "B. 嘴上答应，但行动上没变化", "C. 直接拒绝，并指责你'要求太多'、'不够独立'", "D. 表面答应，背后却因此疏远或抱怨你"] },
        { id:"q12", type:"radio", required:true, title:"12. 在你们的亲密关系中（指情感和身体），你感到的'安全感和满足感'是？", description:[], options:["A. 非常安全且满足，我们彼此信任，连接紧密", "B. 大部分时候稳定，但偶尔会感到疏离或不确定", "C. 经常感到焦虑，担心他不够爱我，或身体接触上他比较被动", "D. 几乎没有亲密感，感觉像室友，或亲密后我更空虚"] },
        // ========== 第三部分：他的投入与爱意（13-20题） ==========
        { id:"part3_intro", type:"radio", required:false, title:"第三部分：他的投入与爱意（13-20题）", description:["这部分是衡量'他爱你有多少'的核心指标，注意观察他的行为。"], options:[] },
        { id:"q13", type:"radio", required:true, title:"13. 他的时间分配里，留给'你们俩'的专属时间是？", description:[], options:["A. 他会主动规划并预留高质量的时间给我，雷打不动", "B. 有空就会找我，但常常被工作或朋友打断", "C. 都是我主动约他，他抽空'配合'我", "D. 他总是很'忙'，我们很少有机会单独相处"] },
        { id:"q14", type:"radio", required:true, title:"14. 他了解你的'喜恶'吗？比如你最爱的花、讨厌的食物、你过去的经历？", description:[], options:["A. 他记得很清楚，并体现在日常细节中", "B. 记得大概，但偶尔会搞错", "C. 我反复说过，但他好像从来记不住", "D. 他从不关心这些，觉得不重要"] },
        { id:"q15", type:"radio", required:true, title:"15. 在他的社交媒体、朋友或家人面前，你的'存在感'如何？", description:[], options:["A. 他大方公开我们的关系，带我进入他的社交圈，并引以为傲", "B. 知道他有对象，但很少带我参与他的核心社交", "C. 他的朋友/家人甚至不知道我的存在", "D. 他刻意回避在熟人面前提及我"] },
        { id:"q16", type:"radio", required:true, title:"16. 当你提出'我感觉你最近有点冷落我'时，他的反应是？", description:[], options:["A. 立刻道歉，解释原因，并询问我的感受，随后有所行动", "B. 说'没有啊，你想多了'，然后继续之前的状态", "C. 觉得我在'作'，引发一场争吵", "D. 完全无视，或冷暴力回应"] },
        { id:"q17", type:"radio", required:true, title:"17. 他为你花钱或在你身上投入资源的态度是？", description:[], options:["A. 在自己能力范围内，非常乐意且主动为你付出，不求回报", "B. 你需要时会给你，但会精打细算，有时让你觉得'不值'", "C. 计较花费，希望你也能同等或更多地付出", "D. 非常吝啬，很少为你付出，常哭穷"] },
        { id:"q18", type:"radio", required:true, title:"18. 他的手机/私人空间，对你的开放程度是？", description:[], options:["A. 不刻意设防，你需要用时很自然，彼此信任", "B. 不主动给你看，但你要求时会给，会有些紧张", "C. 非常在意隐私，手机从不离身，密码保密", "D. 你发现过一些让你不安的内容，或曾删除记录"] },
        { id:"q19", type:"radio", required:true, title:"19. 在你遇到重大挫折（如失业、生病、家庭变故）时，他的行为是？", description:[], options:["A. 坚定地站在你身边，成为你的后盾，共渡难关", "B. 口头安慰，但实际能做的有限，有点想'回避'", "C. 开始挑剔你，抱怨你给他带来麻烦", "D. 迅速疏远，甚至消失"] },
        { id:"q20", type:"radio", required:true, title:"20. 综合来看，你觉得他对这段关系的'长远规划'是？", description:[], options:["A. 我能明确感受到，他正一步步把我规划进他的未来", "B. 他嘴上说想长久，但行为上还在观望", "C. 他享受当下，从不谈论以后", "D. 我感觉他只是把我当作过渡或备选"] }
      ]
    };
    
    // 保存到localStorage
    localStorage.setItem("survey_config", JSON.stringify(config));
    
    // 显示成功信息
    const resultEl = document.getElementById("result");
    resultEl.innerHTML = `
      <h3>✅ 配置应用成功！</h3>
      <p><strong>已保存20道题目：</strong></p>
      <ul>
        <li>第一部分：你的魅力基石（1-5题）</li>
        <li>第二部分：关系健康度（6-12题）</li>
        <li>第三部分：他的投入与爱意（13-20题）</li>
      </ul>
      <p>现在可以查看问卷页面了。</p>
    `;
    resultEl.className = "result success";
    resultEl.style.display = "block";
    
  } catch (error) {
    document.getElementById("result").innerHTML = `<h3>❌ 出错！</h3><p>${error.message}</p>`;
    document.getElementById("result").className = "result error";
    document.getElementById("result").style.display = "block";
  }
}
</script>
</body>
</html>

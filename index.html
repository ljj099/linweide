<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问卷调查</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; padding: 20px;
}
.container { max-width: 680px; margin: 0 auto; }
.header { text-align: center; padding: 32px 0 24px; color: white; }
.header h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
.header p  { font-size: 14px; opacity: .85; }
.card { background: white; border-radius: 16px; padding: 32px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
.user-section { display: flex; gap: 12px; align-items: flex-end; }
.field { flex: 1; }
label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
label .required { color: #ef4444; margin-left: 2px; }
input[type=text] { width: 100%; padding: 10px 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 15px; transition: border-color .2s; outline: none; }
input[type=text]:focus { border-color: #667eea; }
.question-card { background: white; border-radius: 16px; padding: 24px 32px; margin-bottom: 14px; box-shadow: 0 4px 16px rgba(0,0,0,.08); border-left: 4px solid #667eea; }
.q-num { font-size: 12px; color: #667eea; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.q-title { font-size: 16px; font-weight: 600; color: #1f2937; margin-bottom: 16px; line-height: 1.5; }
.q-title .required { color: #ef4444; }
.options { display: flex; flex-direction: column; gap: 10px; }
.option-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 10px; cursor: pointer; transition: all .2s; user-select: none; }
.option-item:hover { border-color: #667eea; background: #f5f3ff; }
.option-item.selected { border-color: #667eea; background: #ede9fe; }
.option-item input { accent-color: #667eea; width: 16px; height: 16px; flex-shrink: 0; }
.option-label { font-size: 15px; color: #374151; }
textarea { width: 100%; padding: 12px 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 15px; font-family: inherit; resize: vertical; min-height: 100px; outline: none; transition: border-color .2s; }
textarea:focus { border-color: #667eea; }
.q-desc { font-size: 13px; color: #6b7280; line-height: 1.6; margin: -8px 0 14px; padding: 8px 12px; background: #f9fafb; border-radius: 8px; border-left: 3px solid #c4b5fd; }
.rating-row { display: flex; gap: 8px; flex-wrap: wrap; }
.rating-btn { width: 46px; height: 46px; border: 2px solid #e5e7eb; border-radius: 10px; background: white; cursor: pointer; font-size: 16px; font-weight: 600; color: #6b7280; transition: all .15s; }
.rating-btn:hover { border-color: #667eea; color: #667eea; }
.rating-btn.active { background: #667eea; border-color: #667eea; color: white; }
.rating-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 12px; color: #9ca3af; }
.submit-wrap { text-align: center; padding: 8px 0 16px; }
.btn-submit { background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; padding: 14px 56px; border-radius: 50px; font-size: 17px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 20px rgba(102,126,234,.45); transition: transform .15s, box-shadow .15s; letter-spacing: 1px; }
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(102,126,234,.55); }
.success-page { display: none; text-align: center; padding: 48px 32px; }
.success-icon { font-size: 72px; margin-bottom: 20px; }
.success-page h2 { font-size: 24px; font-weight: 700; color: #1f2937; margin-bottom: 12px; }
.success-page p  { color: #6b7280; font-size: 15px; line-height: 1.6; }
.error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 10px; padding: 12px 16px; font-size: 14px; margin-bottom: 16px; display: none; }
.footer-hint { text-align: center; color: rgba(255,255,255,.7); font-size: 13px; padding-bottom: 24px; }
.footer-hint a { color: white; text-decoration: underline; cursor: pointer; }
.no-config { text-align: center; padding: 48px 32px; }
.no-config .icon { font-size: 56px; margin-bottom: 16px; }
.no-config h2 { font-size: 20px; color: #374151; margin-bottom: 8px; }
.no-config p  { color: #6b7280; font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 id="survey-title">📋 问卷调查</h1>
    <p id="survey-desc">感谢您抽出时间填写！</p>
  </div>

  <div id="form-area">
    <!-- 填写人信息 -->
      <div class="card">
      <div class="user-section">
        <div class="field">
          <label>您的称呼 <span class="required">*</span></label>
          <input type="text" id="input-name" placeholder="请输入您的称呼" maxlength="20">
        </div>
        <div class="field">
          <label>手机号码</label>
          <input type="tel" id="input-dept" placeholder="请输入手机号码" maxlength="11">
        </div>
      </div>
    </div>

    <!-- 题目动态渲染区 -->
    <div id="questions-area"></div>

    <div class="error-msg" id="error-msg"></div>

    <div class="submit-wrap">
      <button class="btn-submit" onclick="submitSurvey()">提 交 问 卷</button>
    </div>
  </div>

  <!-- 成功页 -->
  <div class="card success-page" id="success-page">
    <div class="success-icon">✅</div>
    <h2>提交成功！</h2>
    <p id="success-msg">感谢您的参与 😊<br>您的回答已成功记录。</p>
  </div>

  <div class="footer-hint">
    管理员入口：<a onclick="window.open('admin.html','_blank')">点击进入后台</a>
  </div>
</div>

<script>
// ── 默认配置（当后台没有保存任何配置时使用） ──────────────
const DEFAULT_CONFIG = {
  title: "关系健康度与魅力评估问卷",
  description: "本问卷分为三个部分，帮助你全面评估自己的魅力、关系健康度和对方的投入度。请根据实际情况诚实作答。",
  questions: [
    // ========== 第一部分：你的魅力基石（1-5题） ==========
    { id:"part1_intro", type:"radio", required:false, title:"第一部分：你的魅力基石（1-5题）", description:["这部分帮助你看见，在关系中你是否依然保持着自己最吸引人的光芒。"], options:[] },
    { id:"q1", type:"radio", required:true, title:"1. 当你独自一人时，你内心最常浮现的感受是？", description:[], options:["A. 平静而充实，有很多自己想做的事", "B. 有点无聊，但能安排自己", "C. 隐隐不安，总想联系他或等待他的消息", "D. 空虚、焦虑，觉得生活没有他就没有意义"] },
    { id:"q2", type:"radio", required:true, title:"2. 关于自己的事业/爱好/成长，你的态度是？", description:[], options:["A. 我有清晰的目标，并且正在为之努力，这让我很有成就感", "B. 我有一些爱好，但常因感情而搁置", "C. 我大部分精力都放在'我们'的关系上，自己的事搁置了", "D. 我几乎没有自己的社交圈和爱好，他是我的全部"] },
    { id:"q3", type:"radio", required:true, title:"3. 当你和伴侣发生分歧时，你最惯常的反应是？", description:[], options:["A. 冷静表达自己的感受和需求，寻求共同解决", "B. 为了避免冲突，先妥协，但内心委屈", "C. 情绪激动，用指责或冷战的方式试图让他'懂'我", "D. 极度恐慌，害怕失去，立刻道歉或放弃自己的立场"] },
    { id:"q4", type:"radio", required:true, title:"4. 照镜子时，你对自己外在形象的评价是？", description:[], options:["A. 我很欣赏自己，打扮更多是为了取悦自己", "B. 基本满意，但会因为他的一句评价而焦虑", "C. 感觉不如以前了，没什么心思打理自己", "D. 很自卑，觉得自己不够好，配不上他"] },
    { id:"q5", type:"radio", required:true, title:"5. 对于'如果分手，我的人生会如何'这个念头，你的第一反应是？", description:[], options:["A. 会很痛苦，但我相信我最终能走出来，并过得更好", "B. 不敢想，我觉得离开他我可能再也找不到更好的了", "C. 天会塌下来，我完全无法想象一个人怎么活", "D. 我从未想过这个可能，我们的关系坚不可摧"] },
    // ========== 第二部分：你们的关系健康度（6-12题） ==========
    { id:"part2_intro", type:"radio", required:false, title:"第二部分：你们的关系健康度（6-12题）", description:["这部分评估你们互动的模式、沟通的质量和关系的根基。"], options:[] },
    { id:"q6", type:"radio", required:true, title:"6. 你们日常沟通中，关于'感受'的对话占比是多少？", description:[], options:["A. 经常分享彼此的喜怒哀乐，他会认真听，我也会", "B. 主要聊日常琐事或安排，很少深入谈感受", "C. 我单方面想聊感受，他常回避或敷衍", "D. 几乎不沟通感受，一谈就容易吵架"] },

    { id:"q8", type:"radio", required:true, title:"8. 你们发生争吵后，通常会如何解决？", description:[], options:["A. 冷静后，双方会主动沟通，一起复盘，关系更紧密", "B. 冷战一段时间，然后不了了之，假装没发生过", "C. 总是我先低头去哄他、道歉，才能和好", "D. 矛盾越积越多，从未真正解决，经常翻旧账"] },
    { id:"q9", type:"radio", required:true, title:"9. 在重要的节日、纪念日或你遇到困难时，他给你的'惊喜'或'支持'是？", description:[], options:["A. 总能记在心里，用我意想不到或我喜欢的方式表达", "B. 需要我提醒，但提醒后会做", "C. 口头承诺多，实际行动少，经常'画饼'", "D. 完全忽略，并觉得这些形式主义很麻烦"] },
    { id:"q10", type:"radio", required:true, title:"10. 关于未来（如定居、职业、家庭等），你们聊得如何？", description:[], options:["A. 我们经常畅想未来，并且目标一致，在共同规划", "B. 聊过，但比较模糊，没有具体计划", "C. 我聊时他回避，或说'现在这样挺好，别想那么远'", "D. 从未聊过，感觉我们的未来没有交集"] },
    { id:"q11", type:"radio", required:true, title:"11. 当你需要他为你做出一些牺牲或改变（比如换个工作、改掉某个习惯）时，他会？", description:[], options:["A. 认真考虑，并愿意为了我们的关系做出努力和调整", "B. 嘴上答应，但行动上没变化", "C. 直接拒绝，并指责你'要求太多'、'不够独立'", "D. 表面答应，背后却因此疏远或抱怨你"] },
    { id:"q12", type:"radio", required:true, title:"12. 在你们的亲密关系中（指情感和身体），你感到的'安全感和满足感'是？", description:[], options:["A. 非常安全且满足，我们彼此信任，连接紧密", "B. 大部分时候稳定，但偶尔会感到疏离或不确定", "C. 经常感到焦虑，担心他不够爱我，或身体接触上他比较被动", "D. 几乎没有亲密感，感觉像室友，或亲密后我更空虚"] },
    // ========== 第三部分：他的投入与爱意（13-20题） ==========
    { id:"part3_intro", type:"radio", required:false, title:"第三部分：他的投入与爱意（13-20题）", description:["这部分是衡量'他爱你有多少'的核心指标，注意观察他的行为。"], options:[] },
    { id:"q13", type:"radio", required:true, title:"13. 他的时间分配里，留给'你们俩'的专属时间是？", description:[], options:["A. 他会主动规划并预留高质量的时间给我，雷打不动", "B. 有空就会找我，但常常被工作或朋友打断", "C. 都是我主动约他，他抽空'配合'我", "D. 他总是很'忙'，我们很少有机会单独相处"] },
    { id:"q14", type:"radio", required:true, title:"14. 他了解你的'喜恶'吗？比如你最爱的花、讨厌的食物、你过去的经历？", description:[], options:["A. 他记得很清楚，并体现在日常细节中", "B. 记得大概，但偶尔会搞错", "C. 我反复说过，但他好像从来记不住", "D. 他从不关心这些，觉得不重要"] },
    { id:"q15", type:"radio", required:true, title:"15. 在他的社交媒体、朋友或家人面前，你的'存在感'如何？", description:[], options:["A. 他大方公开我们的关系，带我进入他的社交圈，并引以为傲", "B. 知道他有对象，但很少带我参与他的核心社交", "C. 他的朋友/家人甚至不知道我的存在", "D. 他刻意回避在熟人面前提及我"] },
    { id:"q16", type:"radio", required:true, title:"16. 当你提出'我感觉你最近有点冷落我'时，他的反应是？", description:[], options:["A. 立刻道歉，解释原因，并询问我的感受，随后有所行动", "B. 说'没有啊，你想多了'，然后继续之前的状态", "C. 觉得我在'作'，引发一场争吵", "D. 完全无视，或冷暴力回应"] },
    { id:"q17", type:"radio", required:true, title:"17. 他为你花钱或在你身上投入资源的态度是？", description:[], options:["A. 在自己能力范围内，非常乐意且主动为你付出，不求回报", "B. 你需要时会给你，但会精打细算，有时让你觉得'不值'", "C. 计较花费，希望你也能同等或更多地付出", "D. 非常吝啬，很少为你付出，常哭穷"] },
    { id:"q18", type:"radio", required:true, title:"18. 他的手机/私人空间，对你的开放程度是？", description:[], options:["A. 不刻意设防，你需要用时很自然，彼此信任", "B. 不主动给你看，但你要求时会给，会有些紧张", "C. 非常在意隐私，手机从不离身，密码保密", "D. 你发现过一些让你不安的内容，或曾删除记录"] },
    { id:"q19", type:"radio", required:true, title:"19. 在你遇到重大挫折（如失业、生病、家庭变故）时，他的行为是？", description:[], options:["A. 坚定地站在你身边，成为你的后盾，共渡难关", "B. 口头安慰，但实际能做的有限，有点想'回避'", "C. 开始挑剔你，抱怨你给他带来麻烦", "D. 迅速疏远，甚至消失"] },
    { id:"q20", type:"radio", required:true, title:"20. 综合来看，你觉得他对这段关系的'长远规划'是？", description:[], options:["A. 我能明确感受到，他正一步步把我规划进他的未来", "B. 他嘴上说想长久，但行为上还在观望", "C. 他享受当下，从不谈论以后", "D. 我感觉他只是把我当作过渡或备选"] }
  ]
};

// ── 读取配置 ─────────────────────────────────────────
let SURVEY_CONFIG = null;
try {
  const saved = localStorage.getItem("survey_config");
  if (saved) {
    SURVEY_CONFIG = JSON.parse(saved);
  } else {
    // 如果localStorage中没有配置，直接使用20道题的配置
    SURVEY_CONFIG = DEFAULT_CONFIG;
    // 同时保存到localStorage，让后台也能读取
    localStorage.setItem("survey_config", JSON.stringify(DEFAULT_CONFIG));
  }
} catch(e) {
  SURVEY_CONFIG = DEFAULT_CONFIG;
  localStorage.setItem("survey_config", JSON.stringify(DEFAULT_CONFIG));
}

// 应用标题
document.getElementById("survey-title").textContent = "📋 " + SURVEY_CONFIG.title;
document.getElementById("survey-desc").textContent   = SURVEY_CONFIG.description || "";
document.title = SURVEY_CONFIG.title;

// ── 渲染题目 ─────────────────────────────────────────
function renderQuestions() {
  const area = document.getElementById("questions-area");
  area.innerHTML = "";
  SURVEY_CONFIG.questions.forEach((q, idx) => {
    const div = document.createElement("div");
    div.className = "question-card";
    div.id = "qcard-" + q.id;

    let inner = `
      <div class="q-num">第 ${idx+1} 题 / 共 ${SURVEY_CONFIG.questions.length} 题</div>
      <div class="q-title">${escHtml(q.title)}${q.required?` <span class="required">*</span>`:""}</div>
      ${(q.description ? (Array.isArray(q.description) ? q.description : [q.description]) : []).map(desc => desc ? `<div class="q-desc">${escHtml(desc)}</div>` : "").join("")}`;

    if (q.type === "radio") {
      inner += `<div class="options">` +
        (q.options||[]).map((opt,oi) => `
          <label class="option-item" id="opt-${q.id}-${oi}" onclick="selectOption('${q.id}','${oi}','radio')">
            <input type="radio" name="${q.id}" value="${escHtml(opt)}" id="radio-${q.id}-${oi}">
            <span class="option-label">${escHtml(opt)}</span>
          </label>`).join("") + `</div>`;
    } else if (q.type === "checkbox") {
      inner += `<div class="options">` +
        (q.options||[]).map((opt,oi) => `
          <label class="option-item" id="opt-${q.id}-${oi}" onclick="selectOption('${q.id}','${oi}','checkbox')">
            <input type="checkbox" name="${q.id}" value="${escHtml(opt)}" id="chk-${q.id}-${oi}">
            <span class="option-label">${escHtml(opt)}</span>
          </label>`).join("") + `</div>`;
    } else if (q.type === "rating") {
      inner += `<div class="rating-row" id="rating-${q.id}">`;
      for (let i = (q.min||1); i <= (q.max||10); i++) {
        inner += `<button class="rating-btn" data-val="${i}" onclick="selectRating('${q.id}',${i})">${i}</button>`;
      }
      inner += `</div><div class="rating-labels"><span>非常不满意</span><span>非常满意</span></div>`;
    } else if (q.type === "textarea") {
      inner += `<textarea id="ta-${q.id}" placeholder="${escHtml(q.placeholder||'请输入...')}" rows="4"></textarea>`;
    }

    div.innerHTML = inner;
    area.appendChild(div);
  });
}

function selectOption(qid, oi, type) {
  if (type === "radio") {
    document.querySelectorAll(`[id^="opt-${qid}-"]`).forEach(el => el.classList.remove("selected"));
    document.getElementById(`opt-${qid}-${oi}`).classList.add("selected");
    document.getElementById(`radio-${qid}-${oi}`).checked = true;
  } else {
    const chk = document.getElementById(`chk-${qid}-${oi}`);
    chk.checked = !chk.checked;
    document.getElementById(`opt-${qid}-${oi}`).classList.toggle("selected", chk.checked);
  }
}

function selectRating(qid, val) {
  document.querySelectorAll(`#rating-${qid} .rating-btn`).forEach(btn => {
    btn.classList.toggle("active", parseInt(btn.dataset.val) === val);
  });
}

// ── 收集答案 ─────────────────────────────────────────
function collectAnswers() {
  const answers = {};
  for (const q of SURVEY_CONFIG.questions) {
    if (q.type === "radio") {
      const c = document.querySelector(`input[name="${q.id}"]:checked`);
      answers[q.id] = c ? c.value : null;
    } else if (q.type === "checkbox") {
      const cs = [...document.querySelectorAll(`input[name="${q.id}"]:checked`)].map(i=>i.value);
      answers[q.id] = cs.length ? cs : null;
    } else if (q.type === "rating") {
      const a = document.querySelector(`#rating-${q.id} .rating-btn.active`);
      answers[q.id] = a ? parseInt(a.dataset.val) : null;
    } else if (q.type === "textarea") {
      const v = (document.getElementById(`ta-${q.id}`)||{}).value||"";
      answers[q.id] = v.trim() || null;
    }
  }
  return answers;
}

const SUPABASE_URL = 'https://pfghdtyayoephtgdqxrx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_9EjDyZQpzVOTas1qjmujnw_rUoCGwNU';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── 提交 ─────────────────────────────────────────────
async function submitSurvey() {
  const name = document.getElementById("input-name").value.trim();
  if (!name) { showError("请先填写您的称呼"); document.getElementById("input-name").focus(); return; }

  const answers = collectAnswers();
  for (const q of SURVEY_CONFIG.questions) {
    if (q.required && (answers[q.id] === null || answers[q.id] === undefined)) {
      showError(`请完成第 ${SURVEY_CONFIG.questions.indexOf(q)+1} 题（必填）`);
      document.getElementById("qcard-"+q.id).scrollIntoView({behavior:"smooth",block:"center"});
      return;
    }
  }

  // 保存到 Supabase
  const { data, error } = await supabase
    .from('surveys')
    .insert([
      {
        name: name,
        phone: document.getElementById("input-dept").value.trim() || "未填写",
        answers: JSON.stringify(answers),
        submit_time: new Date().toLocaleString("zh-CN"),
        survey_title: SURVEY_CONFIG.title
      }
    ]);

  if (error) {
    showError("提交失败：" + error.message);
    console.error('Supabase error:', error);
    return;
  }

  // 成功页
  document.getElementById("form-area").style.display = "none";
  const sp = document.getElementById("success-page");
  sp.style.display = "block";
  document.getElementById("success-msg").innerHTML = `感谢您的参与 😊<br>您的回答已成功记录，管理员将会查阅。`;
  document.querySelector(".header p").textContent = "感谢您的填写！";
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = "⚠️ " + msg;
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 4000);
}

function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

renderQuestions();
</script>
</body>
</html>
